<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etkinlik Takvimi ve Kayıt Portalı</title>
    <meta name="description" content="Okul ve şirket içi etkinlikleri takip edebileceğiniz, tek tıkla kayıt olabileceğiniz modern ve etkileşimli etkinlik takvimi.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Modern CSS Reset & Variable Definitions */
        :root {
            --bg-dark: #080b11;
            --bg-gradient: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #080b11 70%);
            --card-bg: rgba(17, 24, 39, 0.55);
            --card-border: rgba(255, 255, 255, 0.07);
            --card-border-hover: rgba(255, 255, 255, 0.15);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            
            /* Action Colors */
            --color-active: #10b981; /* Canlı Zümrüt Yeşili */
            --color-active-hover: #059669;
            --color-active-glow: rgba(16, 185, 129, 0.25);
            --color-registered: #334155; /* Slate Gri */
            --color-registered-text: #94a3b8;
            
            /* Category Gradients */
            --grad-seminar: linear-gradient(135deg, #6366f1, #a855f7);
            --grad-meeting: linear-gradient(135deg, #0ea5e9, #2563eb);
            --grad-party: linear-gradient(135deg, #ec4899, #f43f5e);
            --grad-workshop: linear-gradient(135deg, #f59e0b, #eab308);
            --grad-education: linear-gradient(135deg, #10b981, #06b6d4);
            --grad-social: linear-gradient(135deg, #14b8a6, #0ea5e9);

            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            --border-radius-lg: 20px;
            --border-radius-md: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-dark);
            background-image: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Ambient Glow Blobs in Background */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: rgba(99, 102, 241, 0.15);
            filter: blur(100px);
            z-index: -1;
            pointer-events: none;
        }

        body::before {
            top: 15%;
            left: 10%;
            background: rgba(236, 72, 153, 0.12);
        }

        body::after {
            bottom: 20%;
            right: 5%;
            background: rgba(16, 185, 129, 0.1);
        }

        /* Container Layout */
        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 3rem 1.5rem;
            flex-grow: 1;
        }

        /* Header Styles */
        header {
            text-align: center;
            margin-bottom: 3.5rem;
            animation: fadeInDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-area {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0.5rem 1.25rem;
            border-radius: 30px;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(5px);
        }

        .logo-dot {
            width: 10px;
            height: 10px;
            background: var(--color-active);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--color-active);
            animation: pulse 2s infinite;
        }

        .logo-text {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-secondary);
        }

        h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ffffff 40%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.125rem;
            max-width: 600px;
            margin: 0 auto 2.5rem auto;
            line-height: 1.6;
        }

        /* Filtering Section */
        .filters {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 2rem;
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 50px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            backdrop-filter: blur(10px);
        }

        .filter-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 0.9rem;
            padding: 0.6rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .filter-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .filter-btn.active {
            background: #4f46e5;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.35);
        }

        /* Events Grid & Cards */
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }

        .event-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius-lg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: var(--transition-smooth);
            position: relative;
            transform-origin: center;
        }

        .event-card:hover {
            transform: translateY(-8px);
            border-color: var(--card-border-hover);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 
                        0 0 1px 1px rgba(255, 255, 255, 0.1) inset;
        }

        /* Card Visual Header */
        .card-header-visual {
            height: 120px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-header-visual::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0.15;
            background-size: 20px 20px;
            background-image: radial-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px);
        }

        /* Custom Gradients by Category */
        .event-card[data-category="Seminer"] .card-header-visual { background: var(--grad-seminar); }
        .event-card[data-category="Toplantı"] .card-header-visual { background: var(--grad-meeting); }
        .event-card[data-category="Parti"] .card-header-visual { background: var(--grad-party); }
        .event-card[data-category="Atölye"] .card-header-visual { background: var(--grad-workshop); }
        .event-card[data-category="Eğitim"] .card-header-visual { background: var(--grad-education); }
        .event-card[data-category="Sosyal"] .card-header-visual { background: var(--grad-social); }

        .category-icon {
            font-size: 3rem;
            color: #ffffff;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2));
            z-index: 1;
            transition: var(--transition-smooth);
        }

        .event-card:hover .category-icon {
            transform: scale(1.15) rotate(5deg);
        }

        .category-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.3rem 0.85rem;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            z-index: 1;
            letter-spacing: 0.05em;
        }

        /* Card Content */
        .card-body {
            padding: 1.75rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .event-date {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #818cf8;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.75rem;
        }

        .event-date svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .event-title {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
        }

        .event-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.55;
            margin-bottom: 1.75rem;
            flex-grow: 1;
        }

        /* Meta details */
        .event-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 1rem;
            margin-bottom: 1.25rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .meta-item svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        .attendee-count {
            font-weight: 500;
            color: var(--text-secondary);
        }

        /* Dynamic Register Button */
        .register-btn {
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: var(--border-radius-md);
            font-family: var(--font-body);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: #ffffff;
            background: var(--color-active);
            box-shadow: 0 4px 15px var(--color-active-glow);
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .register-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transition: 0.5s;
        }

        .register-btn:hover:not(:disabled)::before {
            left: 100%;
        }

        .register-btn:hover:not(:disabled) {
            background: var(--color-active-hover);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
            transform: translateY(-2px);
        }

        .register-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        /* Registered (Success/Disabled) Button State */
        .register-btn:disabled {
            background: var(--color-registered);
            color: var(--color-registered-text);
            box-shadow: none;
            cursor: not-allowed;
            animation: registeredPulse 0.4s ease-out;
        }

        .btn-icon {
            width: 18px;
            height: 18px;
            fill: currentColor;
            transition: var(--transition-smooth);
        }

        /* Dynamic Toast Alert Notifications */
        #toast-container {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-width: 400px;
            width: calc(100% - 3rem);
            pointer-events: none;
        }

        .toast {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-left: 5px solid var(--color-active);
            border-radius: var(--border-radius-md);
            padding: 1rem 1.25rem;
            color: #ffffff;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            pointer-events: auto;
            transform: translateX(120%);
            animation: toastIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            overflow: hidden;
        }

        .toast-content {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .toast-icon {
            width: 20px;
            height: 20px;
            fill: var(--color-active);
        }

        .toast-body {
            font-size: 0.875rem;
            font-weight: 500;
            line-height: 1.4;
        }

        .toast-close {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
        }

        .toast-close:hover {
            color: #ffffff;
        }

        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: var(--color-active);
            width: 100%;
            animation: toastProgress 4s linear forwards;
        }

        /* Footer Styles */
        footer {
            margin-top: auto;
            text-align: center;
            padding: 2.5rem 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            color: var(--text-muted);
            font-size: 0.85rem;
            background: rgba(8, 11, 17, 0.6);
            backdrop-filter: blur(10px);
        }

        footer a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition-smooth);
            font-weight: 500;
        }

        footer a:hover {
            color: #818cf8;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
                box-shadow: 0 0 10px var(--color-active);
            }
            50% {
                transform: scale(1.2);
                opacity: 0.7;
                box-shadow: 0 0 18px var(--color-active);
            }
        }

        @keyframes registeredPulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(0.97);
            }
            100% {
                transform: scale(1);
            }
        }

        @keyframes toastIn {
            to {
                transform: translateX(0);
            }
        }

        @keyframes toastOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(120%);
                opacity: 0;
            }
        }

        @keyframes toastProgress {
            to {
                width: 0;
            }
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition-smooth);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius-lg);
            padding: 2.25rem;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            transition: var(--transition-smooth);
            position: relative;
            background-image: radial-gradient(circle at 100% 0%, rgba(99, 102, 241, 0.12) 0%, transparent 50%);
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-close {
            position: absolute;
            top: 1.25rem;
            right: 1.25rem;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }

        .modal-close:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
        }

        .modal-header {
            margin-bottom: 1.75rem;
            padding-right: 2rem;
        }

        .modal-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .modal-subtitle {
            color: #818cf8;
            font-size: 0.95rem;
            font-weight: 500;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            text-align: left;
        }

        .form-input {
            width: 100%;
            padding: 0.85rem 1.1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius-md);
            color: #ffffff;
            font-family: var(--font-body);
            font-size: 0.95rem;
            transition: var(--transition-smooth);
        }

        .form-input:focus {
            outline: none;
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.25);
            background: rgba(15, 23, 42, 0.8);
        }

        .form-textarea {
            resize: vertical;
            min-height: 90px;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .modal-btn {
            flex: 1;
            padding: 0.85rem;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: var(--border-radius-md);
            border: none;
            cursor: pointer;
            font-family: var(--font-body);
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
        }

        .btn-submit {
            background: var(--color-active);
            color: #ffffff;
            box-shadow: 0 4px 15px var(--color-active-glow);
        }

        .btn-submit:hover {
            background: var(--color-active-hover);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }

        /* Responsive Breakpoints */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.25rem;
            }
            
            .container {
                padding: 2rem 1rem;
            }

            .events-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .filters {
                border-radius: 20px;
                padding: 0.4rem;
            }

            .filter-btn {
                padding: 0.5rem 1rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo-area">
                <span class="logo-dot"></span>
                <span class="logo-text">Etkinlik Platformu</span>
            </div>
            <h1>Geleceğin Etkinliklerini Keşfet</h1>
            <p>Şirket ve okul topluluğumuzdaki en son seminer, atölye ve sosyal etkinlikleri takip et, tek tıkla katılımını garantile.</p>
            
            <!-- Category Filtering -->
            <nav class="filters" aria-label="Etkinlik Kategorileri">
                <button class="filter-btn active" data-filter="All">Tümü</button>
                <button class="filter-btn" data-filter="Seminer">Seminer</button>
                <button class="filter-btn" data-filter="Toplantı">Toplantı</button>
                <button class="filter-btn" data-filter="Parti">Parti</button>
                <button class="filter-btn" data-filter="Atölye">Atölye</button>
                <button class="filter-btn" data-filter="Eğitim">Eğitim</button>
            </nav>
        </header>

        <!-- Main Content -->
        <main>
            <div class="events-grid" id="events-grid" aria-live="polite">
                <!-- Events will be dynamically generated by JS -->
            </div>
        </main>
    </div>

    <!-- Registration Modal Form -->
    <div class="modal-overlay" id="register-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title-text">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal()" aria-label="Kapat">&times;</button>
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title-text">Etkinlik Kayıt Formu</h3>
                <p class="modal-subtitle" id="modal-event-title">Etkinlik Başlığı</p>
            </div>
            <form id="registration-form" onsubmit="submitRegistrationForm(event)">
                <div class="form-group">
                    <label class="form-label" for="reg-name">Adınız Soyadınız *</label>
                    <input class="form-input" type="text" id="reg-name" required placeholder="Örn: Ahmet Yılmaz">
                </div>
                <div class="form-group">
                    <label class="form-label" for="reg-email">E-posta Adresiniz *</label>
                    <input class="form-input" type="email" id="reg-email" required placeholder="Örn: ahmet.yilmaz@okul.edu.tr">
                </div>
                <div class="form-group">
                    <label class="form-label" for="reg-notes">Eklemek İstediğiniz Notlar (İsteğe Bağlı)</label>
                    <textarea class="form-input form-textarea" id="reg-notes" placeholder="Etkinlik yöneticilerine iletmek istediğiniz notlar..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="modal-btn btn-cancel" onclick="closeModal()">İptal Et</button>
                    <button type="submit" class="modal-btn btn-submit">Kaydı Tamamla</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" role="alert" aria-live="assertive"></div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Etkinlik Takvimi & Kayıt Portalı. Tüm hakları saklıdır. | <a href="#">Gizlilik Politikası</a></p>
    </footer>

    <!-- JavaScript Execution -->
    <script>
        // Core Event Data
        const eventsData = [
            {
                id: 1,
                title: "Yapay Zeka ve Geleceğin Teknolojileri Semineri",
                date: "15 Haziran 2026, 14:00",
                description: "Yapay zeka modellerinin iş dünyasındaki etkisi, ChatGPT ve otonom sistemlerin geleceği üzerine kapsamlı bir seminer.",
                category: "Seminer",
                attendeeCount: 42,
                icon: "🧠",
                location: "Ana Konferans Salonu"
            },
            {
                id: 2,
                title: "Yıl Ortası Değerlendirme & Strateji Toplantısı",
                date: "22 Haziran 2026, 10:00",
                description: "Şirket içi hedeflerimizi gözden geçireceğimiz, yılın ikinci yarısı için yol haritamızı belirleyeceğimiz önemli buluşma.",
                category: "Toplantı",
                attendeeCount: 18,
                icon: "📊",
                location: "Toplantı Odası B"
            },
            {
                id: 3,
                title: "Yaz Etkinliği: Welcome Summer Partisi",
                date: "28 Haziran 2026, 18:00",
                description: "Yoğun çalışma döneminin ardından açık havada müzik, ikramlar ve sürpriz etkinliklerle dolu harika bir parti.",
                category: "Parti",
                icon: "🎉",
                attendeeCount: 65,
                location: "Arka Bahçe & Havuz Başı"
            },
            {
                id: 4,
                title: "React ve Modern Web Geliştirme Atölyesi",
                date: "05 Temmuz 2026, 13:00",
                description: "Geliştirici ekibimiz için hazırlanan, React 19 yenilikleri ve performans optimizasyonlarını içeren pratik atölye çalışması.",
                category: "Atölye",
                icon: "💻",
                attendeeCount: 24,
                location: "Teknoloji Laboratuvarı"
            },
            {
                id: 5,
                title: "Kişisel Gelişim ve Etkili İletişim Eğitimi",
                date: "12 Temmuz 2026, 15:30",
                description: "Profesyonel yaşamda ikna kabiliyeti, beden dili ve aktif dinleme konularında uzman eğitmen eşliğinde grup çalışması.",
                category: "Eğitim",
                icon: "🗣️",
                attendeeCount: 31,
                location: "Eğitim Salonu 2"
            },
            {
                id: 6,
                title: "Haftalık Coffee Break & Network Saati",
                date: "Her Cuma, 16:30",
                description: "Cuma günlerinin vazgeçilmezi! Ekipler arası kaynaşmayı artırmak için kahve eşliğinde rahat bir sohbet seansı.",
                category: "Sosyal",
                icon: "☕",
                attendeeCount: 50,
                location: "Kafeterya Dinlenme Alanı"
            }
        ];

        // Retrieve registered states from localStorage
        let registeredEvents = JSON.parse(localStorage.getItem('registeredEvents')) || [];

        // DOM Elements
        const eventsGrid = document.getElementById('events-grid');
        const filterButtons = document.querySelectorAll('.filter-btn');
        const toastContainer = document.getElementById('toast-container');
        const registerModal = document.getElementById('register-modal');
        const modalEventTitle = document.getElementById('modal-event-title');
        const registrationForm = document.getElementById('registration-form');
        let currentRegisteringEventId = null;

        // Render Events Function
        function renderEvents(categoryFilter = 'All') {
            eventsGrid.innerHTML = '';
            
            const filteredEvents = categoryFilter === 'All' 
                ? eventsData 
                : eventsData.filter(event => event.category === categoryFilter);

            if (filteredEvents.length === 0) {
                eventsGrid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-muted);">
                        <p style="font-size: 1.1rem;">Seçilen kategoride şu an aktif bir etkinlik bulunmuyor.</p>
                    </div>
                `;
                return;
            }

            filteredEvents.forEach(event => {
                const isRegistered = registeredEvents.includes(event.id);
                // Adjust attendee count dynamically if user has registered
                const displayCount = isRegistered ? event.attendeeCount + 1 : event.attendeeCount;

                const card = document.createElement('article');
                card.className = 'event-card';
                card.setAttribute('data-category', event.category);
                card.id = `event-${event.id}`;
                card.style.animation = 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both';

                card.innerHTML = `
                    <div class="card-header-visual">
                        <span class="category-badge">${event.category}</span>
                        <span class="category-icon" aria-hidden="true">${event.icon}</span>
                    </div>
                    <div class="card-body">
                        <div class="event-date">
                            <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
                            <span>${event.date}</span>
                        </div>
                        <h2 class="event-title">${event.title}</h2>
                        <p class="event-description">${event.description}</p>
                        
                        <div class="event-meta">
                            <div class="meta-item">
                                <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                                <span>${event.location}</span>
                            </div>
                            <div class="meta-item">
                                <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                                <span class="attendee-count" id="count-${event.id}">${displayCount} Kişi Katılıyor</span>
                            </div>
                        </div>

                        <button 
                            class="register-btn" 
                            id="btn-${event.id}" 
                            onclick="handleRegistration(${event.id})" 
                            ${isRegistered ? 'disabled' : ''}>
                            <span class="btn-text">${isRegistered ? 'Katıldınız ✓' : 'Katılacağım'}</span>
                        </button>
                    </div>
                `;

                eventsGrid.appendChild(card);
            });
        }

        // Registration Click Handler (Opens Modal)
        function handleRegistration(eventId) {
            // Prevent duplicate actions
            if (registeredEvents.includes(eventId)) return;

            // Find event detail
            const event = eventsData.find(e => e.id === eventId);
            if (!event) return;

            // Set current registering ID
            currentRegisteringEventId = eventId;

            // Update modal title text
            modalEventTitle.textContent = event.title;

            // Pre-fill name and email if user details exist from a previous registration
            const allRegDetails = JSON.parse(localStorage.getItem('registrationDetails')) || {};
            const keys = Object.keys(allRegDetails);
            if (keys.length > 0) {
                // Get the most recent registration details
                const lastDetails = allRegDetails[keys[keys.length - 1]];
                document.getElementById('reg-name').value = lastDetails.name || '';
                document.getElementById('reg-email').value = lastDetails.email || '';
            } else {
                document.getElementById('reg-name').value = '';
                document.getElementById('reg-email').value = '';
            }
            
            // Clear notes field
            document.getElementById('reg-notes').value = '';

            // Open modal
            registerModal.classList.add('active');
            document.getElementById('reg-name').focus();
        }

        // Close Modal Function
        function closeModal() {
            registerModal.classList.remove('active');
            currentRegisteringEventId = null;
        }

        // Close modal when clicking outside the modal box
        window.addEventListener('click', (e) => {
            if (e.target === registerModal) {
                closeModal();
            }
        });

        // Submit Registration Form Handler
        function submitRegistrationForm(event) {
            event.preventDefault();

            if (!currentRegisteringEventId) return;

            const eventId = currentRegisteringEventId;
            const eventDetails = eventsData.find(e => e.id === eventId);
            if (!eventDetails) return;

            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const notes = document.getElementById('reg-notes').value.trim();

            // Store registration details in localStorage
            let registrationDetails = JSON.parse(localStorage.getItem('registrationDetails')) || {};
            registrationDetails[eventId] = { name, email, notes, timestamp: new Date().toISOString() };
            localStorage.setItem('registrationDetails', JSON.stringify(registrationDetails));

            // Add to registration array
            registeredEvents.push(eventId);
            localStorage.setItem('registeredEvents', JSON.stringify(registeredEvents));

            // Close modal
            closeModal();

            // Update UI elements
            const btn = document.getElementById(`btn-${eventId}`);
            if (btn) {
                btn.disabled = true;
                btn.querySelector('.btn-text').textContent = 'Katıldınız ✓';
            }

            // Update Attendee Count with micro animation
            const countElement = document.getElementById(`count-${eventId}`);
            if (countElement) {
                countElement.style.opacity = 0;
                setTimeout(() => {
                    countElement.textContent = `${eventDetails.attendeeCount + 1} Kişi Katılıyor`;
                    countElement.style.opacity = 1;
                    countElement.style.color = 'var(--color-active)';
                    countElement.style.fontWeight = '600';
                }, 200);
            }

            // Extract first name for a personalized message
            const firstName = name.split(' ')[0];

            // 1. Trigger Custom Premium Toast Notification
            showToast(`Tebrikler ${firstName}! "${eventDetails.title}" etkinliğine kaydınız başarıyla alındı.`);

            // 2. Trigger Standard Native Alert after a micro delay 
            // So that the transition animations for button and toast can launch smoothly without thread blocking
            setTimeout(() => {
                alert(`Kayıt Başarılı!\n\nSayın ${name},\n"${eventDetails.title}" etkinliğine katılım kaydınız başarıyla tamamlanmıştır.\n\nE-posta: ${email}\nDetaylar e-posta adresinize iletilecektir.`);
            }, 150);
        }

        // Custom Toast Notification System
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            
            toast.innerHTML = `
                <div class="toast-content">
                    <svg class="toast-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                    <div class="toast-body">${message}</div>
                </div>
                <button class="toast-close" onclick="closeToast(this.parentElement)">&times;</button>
                <div class="toast-progress"></div>
            `;

            toastContainer.appendChild(toast);

            // Auto-dismiss after 4 seconds
            setTimeout(() => {
                closeToast(toast);
            }, 4000);
        }

        function closeToast(toastElement) {
            if (!toastElement || !toastElement.parentNode) return;
            toastElement.style.animation = 'toastOut 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards';
            setTimeout(() => {
                if (toastElement.parentNode) {
                    toastContainer.removeChild(toastElement);
                }
            }, 400);
        }

        // Filtering Handler
        filterButtons.forEach(button => {
            button.addEventListener('click', (e) => {
                // Remove active class from all buttons
                filterButtons.forEach(btn => btn.classList.remove('active'));
                
                // Add active class to clicked button
                button.classList.add('active');
                
                const filterValue = button.getAttribute('data-filter');
                renderEvents(filterValue);
            });
        });

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            renderEvents();
        });
    </script>
</body>
</html>
